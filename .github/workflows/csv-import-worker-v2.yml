name: CSV import task worker external v2

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      job_id:
        description: "Optional CSV import job id"
        required: false
      max_tasks:
        description: "Tasks to process in this run"
        required: false
        default: "5"

concurrency:
  group: csv-import-worker-v2
  cancel-in-progress: false

jobs:
  process-csv-import-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Start Render CSV import worker job
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is empty or unavailable to this workflow."
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::RENDER_SERVICE_ID secret is empty or unavailable to this workflow."
            exit 1
          fi
          command="CSV_IMPORT_WORKER_MAX_TASKS=${MAX_TASKS:-5} CSV_IMPORT_WORKER_MAX_RUNTIME_MS=900000 CSV_IMPORT_RESUME_FAILED=true node scripts/run-csv-import-tasks.mjs"
          if [ -n "$JOB_ID" ]; then
            command="$command $JOB_ID"
          fi
          echo "Starting Render one-off CSV import worker job."
          payload=$(jq -n --arg command "$command" '{startCommand: $command}')
          curl --fail --show-error --silent \
            --request POST \
            --header "authorization: Bearer $RENDER_API_KEY" \
            --header "content-type: application/json" \
            --data "$payload" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/jobs"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          MAX_TASKS: ${{ github.event.inputs.max_tasks }}
